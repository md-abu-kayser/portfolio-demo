<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Md Abu Kayser | Full-Stack Engineer</title>

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Login to access Md Abu Kayser's portfolio dashboard. Full-Stack Engineer specializing in React, Node.js, Go, and Web3 technologies."
    />
    <meta
      name="keywords"
      content="login, portfolio, full-stack developer, remote jobs, US Canada EU"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/themes.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                50: "#fff7ed",
                500: "#f97316",
                600: "#ea580c",
              },
              secondary: {
                50: "#f0fdfa",
                500: "#14b8a6",
                600: "#0d9488",
              },
            },
            fontFamily: {
              poppins: ["Poppins", "sans-serif"],
            },
          },
        },
        plugins: [require("daisyui")],
        daisyui: {
          themes: ["light", "dark", "cupcake", "forest", "luxury"],
        },
      };
    </script>
  </head>
  <body
    class="font-poppins bg-base-100 min-h-screen flex items-center justify-center"
  >
    <!-- Background Animation -->
    <div class="fixed inset-0 -z-10">
      <div
        class="absolute inset-0 bg-gradient-to-br from-primary/10 to-secondary/10"
      ></div>
      <div
        class="absolute top-1/4 left-1/4 w-64 h-64 bg-primary/20 rounded-full blur-3xl animate-pulse"
      ></div>
      <div
        class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-secondary/20 rounded-full blur-3xl animate-pulse"
      ></div>
    </div>

    <!-- Login Container -->
    <div class="w-full max-w-md mx-4">
      <!-- Header -->
      <div class="text-center mb-8">
        <a
          href="../index.html"
          class="inline-flex items-center text-2xl font-bold mb-4"
        >
          <span
            class="bg-gradient-to-r from-primary to-secondary text-white p-2 rounded-lg mr-2"
            >dev</span
          >
          <span>Md Abu Kayser</span>
        </a>
        <h1 class="text-3xl font-bold text-base-content mb-2">Welcome Back</h1>
        <p class="text-base-content/70">Sign in to your account to continue</p>
      </div>

      <!-- Login Card -->
      <div class="card bg-base-200 shadow-2xl border border-base-300">
        <div class="card-body p-8">
          <!-- Auth Messages -->
          <div id="auth-messages"></div>

          <!-- Login Form -->
          <form id="login-form" class="space-y-6">
            <div class="form-control">
              <label class="label">
                <span class="label-text font-semibold">Email Address</span>
              </label>
              <input
                type="email"
                name="email"
                placeholder="your.email@example.com"
                class="input input-bordered w-full focus:input-primary"
                required
              />
            </div>

            <div class="form-control">
              <label class="label">
                <span class="label-text font-semibold">Password</span>
                <a
                  href="#forgot-password"
                  class="label-text-alt link link-primary"
                  >Forgot password?</a
                >
              </label>
              <input
                type="password"
                name="password"
                placeholder="Enter your password"
                class="input input-bordered w-full focus:input-primary"
                required
                minlength="6"
              />
            </div>

            <div class="form-control">
              <label class="label cursor-pointer justify-start gap-3">
                <input
                  type="checkbox"
                  name="remember"
                  class="checkbox checkbox-primary"
                />
                <span class="label-text">Remember me</span>
              </label>
            </div>

            <button type="submit" class="btn btn-primary w-full">
              <span>Sign In</span>
              <i class="fas fa-sign-in-alt ml-2"></i>
            </button>
          </form>

          <!-- Divider -->
          <div class="divider text-base-content/50">OR CONTINUE WITH</div>

          <!-- Social Login -->
          <div class="grid grid-cols-2 gap-3">
            <button
              class="btn btn-outline social-auth-btn"
              data-provider="google"
            >
              <i class="fab fa-google text-red-500"></i>
              <span class="hidden sm:inline">Google</span>
            </button>
            <button
              class="btn btn-outline social-auth-btn"
              data-provider="github"
            >
              <i class="fab fa-github"></i>
              <span class="hidden sm:inline">GitHub</span>
            </button>
            <button
              class="btn btn-outline social-auth-btn"
              data-provider="linkedin"
            >
              <i class="fab fa-linkedin text-blue-600"></i>
              <span class="hidden sm:inline">LinkedIn</span>
            </button>
            <button
              class="btn btn-outline social-auth-btn"
              data-provider="twitter"
            >
              <i class="fab fa-x-twitter"></i>
              <span class="hidden sm:inline">Twitter</span>
            </button>
          </div>

          <!-- Signup Link -->
          <div class="text-center mt-6">
            <p class="text-base-content/70">
              Don't have an account?
              <a href="signup.html" class="link link-primary font-semibold"
                >Sign up here</a
              >
            </p>
          </div>
        </div>
      </div>

      <!-- Back to Home -->
      <div class="text-center mt-6">
        <a href="../index.html" class="link link-hover text-base-content/70">
          <i class="fas fa-arrow-left mr-2"></i>
          Back to Home
        </a>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../js/auth.js"></script>
    <script src="../js/theme-switcher.js"></script>
  </body>
</html>
