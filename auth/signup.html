<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Md Abu Kayser | Full-Stack Engineer</title>

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Create an account to access Md Abu Kayser's portfolio and get updates on new projects and opportunities."
    />

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/themes.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: { 500: "#f97316", 600: "#ea580c" },
              secondary: { 500: "#14b8a6", 600: "#0d9488" },
            },
            fontFamily: {
              poppins: ["Poppins", "sans-serif"],
            },
          },
        },
        plugins: [require("daisyui")],
        daisyui: {
          themes: ["light", "dark", "cupcake", "forest", "luxury"],
        },
      };
    </script>
  </head>
  <body class="font-poppins bg-base-100 min-h-screen flex flex-col py-8">
    <!-- Enhanced Navbar -->
    <header
      id="navbar"
      class="navbar bg-base-100/80 backdrop-blur-md shadow-sm fixed top-0 left-0 right-0 z-50 transition-all duration-300 border-b border-base-300/50"
      role="navigation"
    >
      <div
        class="max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <!-- Logo -->
          <a
            href="../index.html"
            class="flex items-center gap-3 group"
            aria-label="Go to homepage"
          >
            <span
              class="inline-flex items-center justify-center bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-2 rounded-lg shadow-md"
            >
              <span class="font-semibold tracking-wide">DEV</span>
            </span>
            <span class="hidden sm:inline text-lg font-semibold"
              >Md Abu Kayser</span
            >
            <i
              class="fas fa-arrow-right ml-2 text-sm transform group-hover:translate-x-1 transition-transform"
            ></i>
          </a>
        </div>

        <!-- Desktop Theme Switcher -->
        <div class="hidden sm:flex items-center gap-2">
          <div class="dropdown dropdown-end">
            <button
              class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-primary/10 hover:text-primary transition flex items-center gap-2"
            >
              <i class="fas fa-palette"></i> Themes
            </button>
            <div
              class="dropdown-content absolute right-0 mt-3 w-48 bg-base-100 rounded-md shadow-2xl border border-base-300 p-3"
              role="menu"
              aria-label="Theme menu"
            >
              <button
                data-theme="light"
                class="w-full text-left py-2 px-3 rounded hover:bg-base-200 transition"
              >
                Light
              </button>
              <button
                data-theme="dark"
                class="w-full text-left py-2 px-3 rounded hover:bg-base-200 transition"
              >
                Dark
              </button>
              <button
                data-theme="cupcake"
                class="w-full text-left py-2 px-3 rounded hover:bg-base-200 transition"
              >
                Cupcake
              </button>
              <button
                data-theme="forest"
                class="w-full text-left py-2 px-3 rounded hover:bg-base-200 transition"
              >
                Forest
              </button>
              <button
                data-theme="luxury"
                class="w-full text-left py-2 px-3 rounded hover:bg-base-200 transition"
              >
                Luxury
              </button>
            </div>
          </div>
        </div>

        <!-- Mobile menu button -->
        <div class="sm:hidden">
          <button
            id="mobile-menu-btn"
            aria-controls="mobile-menu"
            aria-expanded="false"
            aria-label="Open mobile menu"
            class="p-2 rounded-md focus:ring"
          >
            <i
              class="fas fa-bars text-2xl transition-transform duration-200"
            ></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Mobile Menu -->
    <div
      id="mobile-overlay"
      class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden transition-all duration-300"
    ></div>

    <div
      id="mobile-menu"
      class="fixed top-0 right-0 h-full w-80 bg-base-100 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out overflow-y-auto"
    >
      <div class="p-6">
        <div class="flex justify-between items-center mb-8">
          <a
            href="../index.html"
            class="btn btn-ghost normal-case text-xl font-bold flex items-center"
          >
            <span
              class="bg-gradient-to-r from-primary to-secondary text-white p-2 rounded-lg mr-2"
              >DEV</span
            >
            Md Abu Kayser
          </a>
          <button id="close-mobile-menu" class="btn btn-ghost btn-sm">
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>

        <ul class="menu space-y-2 text-lg">
          <li>
            <a
              href="../index.html"
              class="hover:bg-base-200 rounded-lg p-4 transition-all duration-200 flex items-center"
            >
              <i class="fas fa-home mr-3 text-primary w-6"></i>Home
            </a>
          </li>
          <li>
            <a
              href="login.html"
              class="hover:bg-base-200 rounded-lg p-4 transition-all duration-200 flex items-center"
            >
              <i class="fas fa-sign-in-alt mr-3 text-secondary w-6"></i>Login
            </a>
          </li>
        </ul>

        <div class="mt-8 pt-6 border-t border-base-300">
          <h4 class="font-semibold mb-4 text-center">Themes</h4>
          <div class="space-y-2">
            <button
              data-theme="light"
              class="w-full text-left py-2 px-3 rounded hover:bg-base-200 transition"
            >
              Light
            </button>
            <button
              data-theme="dark"
              class="w-full text-left py-2 px-3 rounded hover:bg-base-200 transition"
            >
              Dark
            </button>
            <button
              data-theme="cupcake"
              class="w-full text-left py-2 px-3 rounded hover:bg-base-200 transition"
            >
              Cupcake
            </button>
            <button
              data-theme="forest"
              class="w-full text-left py-2 px-3 rounded hover:bg-base-200 transition"
            >
              Forest
            </button>
            <button
              data-theme="luxury"
              class="w-full text-left py-2 px-3 rounded hover:bg-base-200 transition"
            >
              Luxury
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Background Animation -->
    <div class="fixed inset-0 -z-10">
      <div
        class="absolute inset-0 bg-gradient-to-br from-primary/10 to-secondary/10"
      ></div>
      <div
        class="absolute top-1/4 left-1/4 w-64 h-64 bg-primary/20 rounded-full blur-3xl animate-pulse"
      ></div>
      <div
        class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-secondary/20 rounded-full blur-3xl animate-pulse"
      ></div>
    </div>

    <!-- Main Content with proper padding for navbar -->
    <div class="flex-1 flex items-center justify-center pt-20">
      <!-- Signup Container -->
      <div class="w-full max-w-2xl mx-4">
        <!-- Header -->
        <div class="text-center mb-8">
          <a
            href="../index.html"
            class="inline-flex items-center text-2xl font-bold mb-4"
          >
            <span
              class="bg-gradient-to-r from-primary to-secondary text-white p-2 rounded-lg mr-2"
              >dev</span
            >
            <span>Md Abu Kayser</span>
          </a>
          <h1 class="text-3xl font-bold text-base-content mb-2">
            Create Your Account
          </h1>
          <p class="text-base-content/70">
            Join my network and stay updated with latest projects
          </p>
        </div>

        <!-- Signup Card -->
        <div class="card bg-base-200 shadow-2xl border border-base-300">
          <div class="card-body p-8">
            <!-- Auth Messages -->
            <div id="auth-messages"></div>

            <!-- Signup Form -->
            <form id="signup-form" class="space-y-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                  <label class="label">
                    <span class="label-text font-semibold">First Name</span>
                  </label>
                  <input
                    type="text"
                    name="firstName"
                    placeholder="John"
                    class="input input-bordered w-full focus:input-primary"
                    required
                  />
                </div>

                <div class="form-control">
                  <label class="label">
                    <span class="label-text font-semibold">Last Name</span>
                  </label>
                  <input
                    type="text"
                    name="lastName"
                    placeholder="Doe"
                    class="input input-bordered w-full focus:input-primary"
                    required
                  />
                </div>
              </div>

              <div class="form-control">
                <label class="label">
                  <span class="label-text font-semibold">Email Address</span>
                </label>
                <input
                  type="email"
                  name="email"
                  placeholder="your.email@example.com"
                  class="input input-bordered w-full focus:input-primary"
                  required
                />
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                  <label class="label">
                    <span class="label-text font-semibold">Password</span>
                  </label>
                  <input
                    type="password"
                    name="password"
                    placeholder="Create password"
                    class="input input-bordered w-full focus:input-primary"
                    required
                    minlength="8"
                  />
                  <label class="label">
                    <span class="label-text-alt">Minimum 8 characters</span>
                  </label>
                </div>

                <div class="form-control">
                  <label class="label">
                    <span class="label-text font-semibold"
                      >Confirm Password</span
                    >
                  </label>
                  <input
                    type="password"
                    name="confirmPassword"
                    placeholder="Confirm password"
                    class="input input-bordered w-full focus:input-primary"
                    required
                  />
                </div>
              </div>

              <div class="form-control">
                <label class="label cursor-pointer justify-start gap-3">
                  <input
                    type="checkbox"
                    name="terms"
                    class="checkbox checkbox-primary"
                    required
                  />
                  <span class="label-text">
                    I agree to the
                    <a href="#terms" class="link link-primary"
                      >Terms of Service</a
                    >
                    and
                    <a href="#privacy" class="link link-primary"
                      >Privacy Policy</a
                    >
                  </span>
                </label>
              </div>

              <div class="form-control">
                <label class="label cursor-pointer justify-start gap-3">
                  <input
                    type="checkbox"
                    name="newsletter"
                    class="checkbox checkbox-primary"
                  />
                  <span class="label-text"
                    >Subscribe to newsletter for project updates</span
                  >
                </label>
              </div>

              <button type="submit" class="btn btn-primary w-full">
                <span>Create Account</span>
                <i class="fas fa-user-plus ml-2"></i>
              </button>
            </form>

            <!-- Divider -->
            <div class="divider text-base-content/50">OR SIGN UP WITH</div>

            <!-- Social Signup -->
            <div class="grid grid-cols-2 gap-3">
              <button
                class="btn btn-outline social-auth-btn"
                data-provider="google"
              >
                <i class="fab fa-google text-red-500"></i>
                <span class="hidden sm:inline">Google</span>
              </button>
              <button
                class="btn btn-outline social-auth-btn"
                data-provider="github"
              >
                <i class="fab fa-github"></i>
                <span class="hidden sm:inline">GitHub</span>
              </button>
              <button
                class="btn btn-outline social-auth-btn"
                data-provider="linkedin"
              >
                <i class="fab fa-linkedin text-blue-600"></i>
                <span class="hidden sm:inline">LinkedIn</span>
              </button>
              <button
                class="btn btn-outline social-auth-btn"
                data-provider="twitter"
              >
                <i class="fab fa-x-twitter"></i>
                <span class="hidden sm:inline">Twitter</span>
              </button>
            </div>

            <!-- Login Link -->
            <div class="text-center mt-6">
              <p class="text-base-content/70">
                Already have an account?
                <a href="login.html" class="link link-primary font-semibold"
                  >Sign in here</a
                >
              </p>
            </div>
          </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
          <a href="../index.html" class="link link-hover text-base-content/70">
            <i class="fas fa-arrow-left mr-2"></i>
            Back to Home
          </a>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../js/auth.js"></script>
    <script src="../js/theme-switcher.js"></script>
    <script>
      // Mobile menu handlers for signup page
      document.addEventListener("DOMContentLoaded", function () {
        const mobileMenuBtn = document.getElementById("mobile-menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");
        const mobileOverlay = document.getElementById("mobile-overlay");
        const closeMobileMenu = document.getElementById("close-mobile-menu");

        function toggleMenu() {
          mobileMenu.classList.toggle("translate-x-full");
          mobileOverlay.classList.toggle("hidden");
        }

        mobileMenuBtn.addEventListener("click", toggleMenu);
        closeMobileMenu.addEventListener("click", toggleMenu);
        mobileOverlay.addEventListener("click", toggleMenu);

        // Theme switching
        document.querySelectorAll("[data-theme]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const theme = e.currentTarget.dataset.theme;
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("portfolio-theme", theme);
            toggleMenu();
          });
        });
      });
    </script>
  </body>
</html>
